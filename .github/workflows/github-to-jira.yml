# When a Copilot coding agent PR is opened or merged, update the linked
# Jira issue: transition status and post a comment with PR details.
#
# Required secrets:
#   JIRA_BASE_URL   — e.g. https://your-site.atlassian.net
#   JIRA_USER_EMAIL — Jira account email
#   JIRA_API_TOKEN  — Jira API token

name: "GitHub → Jira Sync"

on:
  pull_request:
    types: [opened, closed]

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, 'Jira Issue:') || contains(github.event.pull_request.title, 'KAN-')

    steps:
      - name: Extract Jira key from PR
        id: extract
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Try PR title first (e.g. "[KAN-1] Fix pagination")
          KEY=$(echo "$PR_TITLE" | grep -oE 'KAN-[0-9]+' | head -1)

          # Fall back to PR body
          if [ -z "$KEY" ]; then
            KEY=$(echo "$PR_BODY" | grep -oE 'KAN-[0-9]+' | head -1)
          fi

          if [ -z "$KEY" ]; then
            echo "No Jira key found — skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "key=${KEY}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Jira on PR opened
        if: steps.extract.outputs.found == 'true' && github.event.action == 'opened'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          KEY="${{ steps.extract.outputs.key }}"

          # Post comment to Jira
          COMMENT_BODY=$(printf '{"body":{"type":"doc","version":1,"content":[{"type":"paragraph","content":[{"type":"text","text":"Copilot coding agent opened a PR: "},{"type":"text","text":"%s","marks":[{"type":"link","attrs":{"href":"%s"}}]}]}]}}' \
            "$PR_TITLE" "$PR_URL")
          curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
            -d "$COMMENT_BODY"

          # Look up the "In Progress" transition ID dynamically
          TRANSITION_ID=$(curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Accept: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" | \
            jq -r '.transitions[] | select(.name == "In Progress") | .id')

          if [ -n "$TRANSITION_ID" ]; then
            curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}"
          fi

      - name: Update Jira on PR merged
        if: steps.extract.outputs.found == 'true' && github.event.pull_request.merged == true
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          KEY="${{ steps.extract.outputs.key }}"
          SHORT_SHA=${MERGE_SHA:0:7}

          # Post merge comment
          COMMENT_BODY=$(printf '{"body":{"type":"doc","version":1,"content":[{"type":"paragraph","content":[{"type":"text","text":"PR merged. Commit: %s — "},{"type":"text","text":"View PR","marks":[{"type":"link","attrs":{"href":"%s"}}]}]}]}}' \
            "$SHORT_SHA" "$PR_URL")
          curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
            -d "$COMMENT_BODY"

          # Look up the "Done" transition ID dynamically
          TRANSITION_ID=$(curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Accept: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" | \
            jq -r '.transitions[] | select(.name == "Done") | .id')

          if [ -n "$TRANSITION_ID" ]; then
            curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}"
          fi
