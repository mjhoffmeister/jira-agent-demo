# Option B — Jira-to-GitHub Sync via Polling
#
# Fallback workflow for when the first-party "Copilot coding agent for Jira"
# integration is unavailable (e.g., no Jira Standard/Rovo access).
#
# Polls Jira every 5 minutes for issues with label "agent-ready" in status
# "To Do". Creates a GitHub Issue and assigns the Copilot coding agent.
#
# Required secrets:
#   JIRA_BASE_URL   — e.g. https://your-site.atlassian.net
#   JIRA_USER_EMAIL — Jira account email
#   JIRA_API_TOKEN  — Jira API token (Account Settings > Security > API tokens)

name: "Jira → GitHub Sync"

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger for demos

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Fetch agent-ready Jira issues
        id: jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          # JQL: project = KAN, status = "To Do", label = agent-ready,
          # not already synced (no "gh-synced" label).
          JQL='project = KAN AND status = "To Do" AND labels = agent-ready AND labels != gh-synced'
          ENCODED_JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$JQL'))")

          echo "JQL: $JQL"
          echo "Encoded: $ENCODED_JQL"
          RESPONSE=$(curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Accept: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/search/jql?jql=${ENCODED_JQL}&fields=summary,description,key,status,labels")

          echo "Total results: $(echo "$RESPONSE" | jq '.total // 0')"
          echo "Errors: $(echo "$RESPONSE" | jq '.errorMessages // empty')"
          echo "issues=$(echo "$RESPONSE" | jq -c '.issues // []')" >> "$GITHUB_OUTPUT"

      - name: Ensure jira-sync label exists
        if: steps.jira.outputs.issues != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "jira-sync" --description "Synced from Jira" --color "1d76db" 2>/dev/null || true

      - name: Create GitHub Issues and assign Copilot
        if: steps.jira.outputs.issues != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_ISSUES: ${{ steps.jira.outputs.issues }}
        run: |
          echo "$JIRA_ISSUES" | jq -c '.[]' | while read -r issue; do
            KEY=$(echo "$issue" | jq -r '.key')
            SUMMARY=$(echo "$issue" | jq -r '.fields.summary')
            # Render Jira ADF description to plain text (basic fallback)
            DESC=$(echo "$issue" | jq -r '[.fields.description.content[]?.content[]?.text // empty] | join(" ")' | head -50)

            # Build issue body safely via printf
            BODY=$(printf '**Jira Issue:** [%s](%s/browse/%s)\n\n%s\n\n---\n_Synced from Jira. Do not edit the Jira key above._' \
              "$KEY" "$JIRA_BASE_URL" "$KEY" "$DESC")

            # Create GitHub Issue (without assignee — bot must be assigned via API)
            GH_ISSUE_URL=$(gh issue create \
              --title "[${KEY}] ${SUMMARY}" \
              --body "$BODY" \
              --label "jira-sync" 2>&1) || true

            echo "Created: ${GH_ISSUE_URL}"

            # Extract issue number from URL
            ISSUE_NUMBER=$(echo "$GH_ISSUE_URL" | grep -oE '[0-9]+$')

            # Assign Copilot coding agent via REST API
            if [ -n "$ISSUE_NUMBER" ]; then
              gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/assignees" \
                --method POST \
                -f "assignees[]=copilot-swe-agent[bot]" 2>&1 || \
              echo "Warning: Could not assign coding agent. Assign manually on GitHub."
            fi

            # Mark Jira issue as synced by adding label
            curl -s -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X PUT \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}" \
              -d '{"update":{"labels":[{"add":"gh-synced"}]}}'
          done
